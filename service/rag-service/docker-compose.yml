version: '3.8'
services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: my_chromadb
    ports:
      - "8000:8000" # 映射端口
    volumes:
      - ./chroma_data:/chroma/chroma # 数据持久化，防止容器重启数据丢失
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
